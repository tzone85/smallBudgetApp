<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Courgette&display=swap" rel="stylesheet">
  <title>Nozzles Budget App</title>
</head>
<body>
  <main class="container-fluid">
    <div class="row">
      <div class="col-11 mx-auto pt-3">
        <h3 class="text-uppercase mb-4">Nozzles budget app</h3>

        <div class="row">
          <section class="col-md-5 my-3">
            <div class="budget-feedback alert alert-danger text-capitalize" role="alert"></div>
            <form id="budget-form" class="budget-form">
              <h5 class="text-capitalize"><label for="budget-input">please enter your budget</label></h5>
              <div class="form-group mb-2">
                <input type="number" min="0" step="1" class="form-control budget-input" id="budget-input" required>
              </div>
              <button type="submit" class="btn text-capitalize budget-submit" id="budget-submit">calculate</button>
            </form>
          </section>

          <section class="col-md-7">
            <div class="row my-3">
              <div class="col-4 text-center mb-2">
                <h6 class="text-uppercase info-title">budget</h6>
                <h4 class="text-uppercase mt-2 budget" id="budget"><span data-currency></span><span id="budget-amount">0</span></h4>
              </div>
              <div class="col-4 text-center">
                <h6 class="text-uppercase info-title">expenses</h6>
                <h4 class="text-uppercase mt-2 expense" id="expense"><span data-currency></span><span id="expense-amount">0</span></h4>
              </div>
              <div class="col-4 text-center">
                <h6 class="text-uppercase info-title">balance</h6>
                <h4 class="text-uppercase mt-2 balance" id="balance"><span data-currency></span><span id="balance-amount">0</span></h4>
              </div>
            </div>
          </section>
        </div>

        <div class="row">
          <section class="col-md-5 my-3">
            <div class="expense-feedback alert alert-danger text-capitalize" role="alert"></div>
            <form id="expense-form" class="expense-form">
              <h5 class="text-capitalize"><label for="expense-input">please enter your expense</label></h5>
              <div class="form-group mb-2">
                <input type="text" class="form-control expense-input" id="expense-input" required>
              </div>
              <h5 class="text-capitalize"><label for="amount-input">please enter expense amount</label></h5>
              <div class="form-group mb-2">
                <input type="number" min="0" step="1" class="form-control expense-input" id="amount-input" required>
              </div>
              <button type="submit" class="btn text-capitalize expense-submit" id="expense-submit">add expense</button>
            </form>
          </section>

          <section class="col-md-7 my-3">
            <div id="expense-list" class="expense-list" aria-live="polite"></div>
          </section>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
